name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: temp-mail-console-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build app and worker
        run: npm run build

      - name: Export remote D1 backup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p backups
          BACKUP_FILE="backups/d1-temp-email-db-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.sql"
          npx wrangler d1 export temp-email-db --remote --output "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"

      - name: Upload D1 backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 7

      - name: Sync Worker secrets and variables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FORWARD_TO: ${{ secrets.FORWARD_TO }}
          MAILBOX_DOMAIN: ${{ secrets.MAILBOX_DOMAIN }}
          ALLOWED_API_ORIGINS: ${{ secrets.ALLOWED_API_ORIGINS }}
          ERROR_WEBHOOK_URL: ${{ secrets.ERROR_WEBHOOK_URL }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_EMAIL_WORKER: ${{ secrets.CLOUDFLARE_EMAIL_WORKER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_DOMAIN: ${{ secrets.RESEND_FROM_DOMAIN }}
          RESEND_DEFAULT_FROM_NAME: ${{ secrets.RESEND_DEFAULT_FROM_NAME }}
          RESEND_DEFAULT_FROM: ${{ secrets.RESEND_DEFAULT_FROM }}
          RESEND_DEFAULT_REPLY_TO: ${{ secrets.RESEND_DEFAULT_REPLY_TO }}
        run: |
          printf '%s' "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
          printf '%s' "$API_TOKEN" | npx wrangler secret put API_TOKEN
          printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
          if [ -n "$FORWARD_TO" ]; then printf '%s' "$FORWARD_TO" | npx wrangler secret put FORWARD_TO; fi
          if [ -n "$MAILBOX_DOMAIN" ]; then printf '%s' "$MAILBOX_DOMAIN" | npx wrangler secret put MAILBOX_DOMAIN; fi
          if [ -n "$ALLOWED_API_ORIGINS" ]; then printf '%s' "$ALLOWED_API_ORIGINS" | npx wrangler secret put ALLOWED_API_ORIGINS; fi
          if [ -n "$ERROR_WEBHOOK_URL" ]; then printf '%s' "$ERROR_WEBHOOK_URL" | npx wrangler secret put ERROR_WEBHOOK_URL; fi
          if [ -n "$CLOUDFLARE_ZONE_ID" ]; then printf '%s' "$CLOUDFLARE_ZONE_ID" | npx wrangler secret put CLOUDFLARE_ZONE_ID; fi
          if [ -n "$CLOUDFLARE_EMAIL_WORKER" ]; then printf '%s' "$CLOUDFLARE_EMAIL_WORKER" | npx wrangler secret put CLOUDFLARE_EMAIL_WORKER; fi
          if [ -n "$RESEND_API_KEY" ]; then printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY; fi
          if [ -n "$RESEND_FROM_DOMAIN" ]; then printf '%s' "$RESEND_FROM_DOMAIN" | npx wrangler secret put RESEND_FROM_DOMAIN; fi
          if [ -n "$RESEND_DEFAULT_FROM_NAME" ]; then printf '%s' "$RESEND_DEFAULT_FROM_NAME" | npx wrangler secret put RESEND_DEFAULT_FROM_NAME; fi
          if [ -n "$RESEND_DEFAULT_FROM" ]; then printf '%s' "$RESEND_DEFAULT_FROM" | npx wrangler secret put RESEND_DEFAULT_FROM; fi
          if [ -n "$RESEND_DEFAULT_REPLY_TO" ]; then printf '%s' "$RESEND_DEFAULT_REPLY_TO" | npx wrangler secret put RESEND_DEFAULT_REPLY_TO; fi

      - name: Apply remote migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run db:migrate:remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
