name = "temp-email-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true

[observability]
enabled = true

[observability.logs]
invocation_logs = true

[observability.traces]
enabled = true

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/admin/*", "/auth/*"]

[[d1_databases]]
binding = "DB"
database_name = "temp-email-db"
database_id = "c7a00761-49cc-44e4-af68-c95ca29f35cb"

[triggers]
crons = ["*/5 * * * *"] # 每 5 分钟执行一次，处理计划发送并清理过期任务
